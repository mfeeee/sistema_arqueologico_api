name: Tests

on:
  push:
    branches: [main, master, develop, workos]
  pull_request:
    branches: [main, master, develop, workos]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: cp .env.example .env

      - name: Start Docker Containers
        run: docker compose up -d --build

      - name: Install PHP Dependencies (Inside Container)
        run: docker compose exec -T app composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate App Key
        run: docker compose exec -T app php artisan key:generate

      - name: Setup PHP on Host
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node Dependencies & Build Assets
        run: |
          npm ci
          npm run build

      - name: Run Tests (Inside Container)
        run: docker compose exec -T app php artisan test