name: Tests

on:
  push:
    branches: [main, master, develop, workos]
  pull_request:
    branches: [main, master, develop, workos]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Docker Containers
        run: docker compose up -d --build
        
      - name: Prepare Environment
        run: docker compose exec -T app sh -c "cp .env.example .env"

      - name: Install PHP Dependencies (Inside Container)
        run: docker compose exec -T app composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate App Key
        run: |
          docker compose exec -T app php artisan key:generate
          docker compose exec -T app php artisan key:generate --env=testing

      - name: Clear Config Cache
        run: docker compose exec -T app php artisan config:clear

      - name: Run Tests (Inside Container)
        run: docker compose exec -T app php artisan test