name: Deploy

on:
  workflow_run:
    workflows: ["Tests"]
    branches: [main]
    types:
      - completed

jobs:
  # Railway
  deploy-railway:
    name: Deploy → Railway
    runs-on: ubuntu-latest
    environment: railway
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger Railway deploy hook
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.DEPLOY_HOOK_URL }}")
          echo "HTTP status: $STATUS"
          echo "$STATUS" | grep -qE '^(200|201|202)' \
            && echo "Deploy Railway disparado." \
            || (echo "Falha ao disparar deploy Railway." && exit 1)

