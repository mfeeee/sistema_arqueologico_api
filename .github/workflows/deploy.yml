  notify-failure:
    name: Notify — testes falharam
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Log failure
        run: echo "Deploy cancelado — testes falharam no commit ${{ github.event.workflow_run.head_sha }}"